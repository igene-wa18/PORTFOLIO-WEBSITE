// ── Three.js canvas ───────────────────────────────────────────────
function ThreeCanvas({ onCameraRef }) {
  const mountRef = useRef();

  useEffect(() => {
    const el = mountRef.current;
    if (!el || typeof THREE === 'undefined') return;

    const W = window.innerWidth, H = window.innerHeight;
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x010105);
    scene.fog = new THREE.FogExp2(0x010105, 0.05);

    const camera = new THREE.PerspectiveCamera(52, W/H, 0.1, 100);
    camera.position.set(0, 2.35, 3.6);
    camera.lookAt(0, 1.9, 0);
    onCameraRef(camera);

    const renderer = new THREE.WebGLRenderer({ antialias:true });
    renderer.setSize(W, H);
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    el.appendChild(renderer.domElement);

    // Lights
    scene.add(new THREE.AmbientLight(0x1a1040, 3));
    const keyL = new THREE.DirectionalLight(0xffffff, 1.4);
    keyL.position.set(2,6,4); keyL.castShadow=true; scene.add(keyL);
    const purpL = new THREE.PointLight(0x9933ff, 5, 9);
    purpL.position.set(0,2,-2.5); scene.add(purpL);
    const bl = new THREE.PointLight(0x2255ff,2.5,12);
    bl.position.set(-3.5,2,1.5); scene.add(bl);
    const rl = new THREE.DirectionalLight(0xcc88ff,.9);
    rl.position.set(-2,5,-4); scene.add(rl);

    // Helpers
    const mk=(c,r=.7,m=.05)=>new THREE.MeshStandardMaterial({color:c,roughness:r,metalness:m});
    const box=(p,mat,w,h,d,x,y,z)=>{const m=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),mat);m.position.set(x,y,z);m.castShadow=true;p.add(m);return m;};
    const cyl=(p,mat,rt,rb,ht,sg,x,y,z)=>{const m=new THREE.Mesh(new THREE.CylinderGeometry(rt,rb,ht,sg),mat);m.position.set(x,y,z);m.castShadow=true;p.add(m);return m;};
    const sph=(p,mat,r,sg,x,y,z,sx=1,sy=1,sz=1)=>{const m=new THREE.Mesh(new THREE.SphereGeometry(r,sg,sg),mat);m.position.set(x,y,z);m.scale.set(sx,sy,sz);m.castShadow=true;p.add(m);return m;};

    const char=new THREE.Group(); scene.add(char);
    const skinM=mk(0xfce0cc,.65),hairM=mk(0x0d0d0d,.85),shirtM=mk(0xf0f0f0,.8),metalM=mk(0x0a0a1a,.3,.7),deskM=mk(0x12122a,.38,.45);

    // Head + hair
    sph(char,skinM,.53,36,0,2.1,0,1,1.08,.96);
    const hd=new THREE.Mesh(new THREE.SphereGeometry(.555,36,18,0,Math.PI*2,0,Math.PI*.52),hairM);
    hd.position.set(0,2.12,.02); char.add(hd);
    sph(char,hairM,.32,16,-.14,2.54,.2,1.5,.42,.65);

    // Eyes
    const ewM=mk(0xffffff,.3),irM=new THREE.MeshStandardMaterial({color:0x5533bb,roughness:.2,metalness:.4}),puM=mk(0,.8);
    [[-0.165,2.1,.44],[.165,2.1,.44]].forEach(([x,y,z])=>{
      sph(char,ewM,.098,16,x,y,z,.78,.88,.58);
      sph(char,irM,.062,14,x,y,z+.038);
      sph(char,puM,.033,12,x,y,z+.056);
    });

    // Brows
    [[-0.175,.15],[.175,-.15]].forEach(([x,rz])=>{
      const b=new THREE.Mesh(new THREE.BoxGeometry(.18,.042,.038),mk(0x111111,.9));
      b.position.set(x,2.275,.43); b.rotation.z=rz; char.add(b);
    });

    // Nose, ears, neck, torso
    sph(char,mk(0xeecdb8,.7),.072,12,0,1.99,.5,.68,.52,.78);
    [-1,1].forEach(s=>sph(char,skinM,.13,16,s*.555,2.06,0,.52,.92,.52));
    cyl(char,skinM,.168,.2,.28,16,0,1.67,0);
    cyl(char,shirtM,.32,.38,.88,22,0,1.1,0);
    [-1,1].forEach(s=>sph(char,shirtM,.21,16,s*.44,1.43,0,1,.78,.88));

    // Arms + hands — reaching toward keyboard at back of desk
    [-1,1].forEach(s=>{
      const ua=new THREE.Mesh(new THREE.CylinderGeometry(.098,.11,.52,12),shirtM);
      ua.position.set(s*.58,1.1,0); ua.rotation.z=s*.28; char.add(ua);
      const fa=new THREE.Mesh(new THREE.CylinderGeometry(.078,.092,.48,12),skinM);
      fa.position.set(s*.7,.68,-.22); fa.rotation.x=.68; fa.rotation.z=s*.08; char.add(fa);
      sph(char,skinM,.095,12,s*.71,.63,-.45,.88,.58,1.05);
    });
    cyl(char,mk(0x0d0d1a,.85),.37,.3,.58,20,0,.44,0);

    // Desk + LED
    const dt=new THREE.Mesh(new THREE.BoxGeometry(3.4,.09,1.5),deskM);
    dt.position.set(0,.63,.25); dt.receiveShadow=true; char.add(dt);
    const led=new THREE.Mesh(new THREE.BoxGeometry(3.4,.018,.018),
      new THREE.MeshStandardMaterial({color:0x9933ff,emissive:0x9933ff,emissiveIntensity:3}));
    led.position.set(0,.678,-.47); char.add(led);
    [[-1.58,-.44],[1.58,-.44],[-1.58,.97],[1.58,.97]].forEach(([x,z])=>{
      const l=new THREE.Mesh(new THREE.BoxGeometry(.06,.9,.06),metalM); l.position.set(x,.15,z); char.add(l);
    });

    // Monitor — moved to FRONT of desk (facing camera)
    box(char,mk(0x0a0a0a,.5,.55),1.35,.85,.06,0,1.17,.72);
    box(char,new THREE.MeshStandardMaterial({color:0x6622cc,emissive:0x9933ff,emissiveIntensity:1.8,roughness:.1}),1.18,.74,.012,0,1.17,.68);
    const lnM=new THREE.MeshStandardMaterial({color:0xffffff,emissive:0xffffff,emissiveIntensity:.6});
    [.25,.12,-.01,-.14,-.27].forEach((yo,i)=>{const w=[.4,.6,.35,.55,.28][i]; box(char,lnM,w,.018,.001,-.2,1.17+yo,.69);});
    const scrL=new THREE.PointLight(0x9933ff,3.5,5); scrL.position.set(0,1.17,.55); char.add(scrL);
    cyl(char,metalM,.038,.12,.38,12,0,.68,.72);
    box(char,metalM,.42,.04,.28,0,.49,.72);

    // Keyboard + mouse — on back half of desk (near character)
    box(char,mk(0x0e0e22,.5,.4),.88,.026,.3,0,.644,-.12);
    for(let r=0;r<4;r++) for(let c=0;c<10;c++) box(char,mk(0x1a1a38,.4,.3),.058,.01,.052,-.365+c*.078,.658,-.068+r*.067);
    sph(char,mk(0x0a0a1e,.5,.5),.058,12,.62,.653,-.1,.88,.48,1.28);
    // Plant + mug on desk sides
    cyl(char,mk(0x3a1a10,.8),.07,.09,.14,10,-1.3,.715,.3);
    sph(char,mk(0x1a5522,.9),.12,8,-1.3,.83,.3);
    cyl(char,mk(0x2a1a0a,.7),.055,.055,.1,14,1.2,.7,.3);

    // Chair — moved to BACK of desk (behind desk, far from camera)
    const chM=mk(0x080816,.9);
    box(char,chM,.8,.075,.75,0,.29,-.62);
    box(char,chM,.8,.9,.065,0,.745,-1.0);
    [-1,1].forEach(s=>box(char,chM,.048,.042,.52,s*.38,.48,-.62));
    for(let i=0;i<5;i++){const sp=new THREE.Mesh(new THREE.BoxGeometry(.055,.038,.38),metalM);sp.rotation.y=(i/5)*Math.PI*2;sp.position.set(0,-.065,-.62);char.add(sp);}
    cyl(char,metalM,.03,.03,.42,8,0,.08,-.62);

    // Floor + glow
    const fl=new THREE.Mesh(new THREE.PlaneGeometry(40,40),mk(0x030308,1));
    fl.rotation.x=-Math.PI/2; fl.position.y=-.37; fl.receiveShadow=true; scene.add(fl);
    const gc=new THREE.Mesh(new THREE.CircleGeometry(2.2,64),
      new THREE.MeshStandardMaterial({color:0x9933ff,emissive:0x9933ff,emissiveIntensity:.08,transparent:true,opacity:.2}));
    gc.rotation.x=-Math.PI/2; gc.position.set(0,-.36,0); scene.add(gc);

    // Particles
    const pN=400,pp=new Float32Array(pN*3);
    for(let i=0;i<pN;i++){pp[i*3]=(Math.random()-.5)*30;pp[i*3+1]=Math.random()*14;pp[i*3+2]=(Math.random()-.5)*30;}
    const pGeo=new THREE.BufferGeometry();
    pGeo.setAttribute('position',new THREE.BufferAttribute(pp,3));
    const ptcl=new THREE.Points(pGeo,new THREE.PointsMaterial({color:0x9933ff,size:.038,transparent:true,opacity:.65}));
    scene.add(ptcl);

    // Render loop
    let raf;
    const tick=()=>{
      raf=requestAnimationFrame(tick);
      const t=Date.now()*.001;
      char.position.y=Math.sin(t*.7)*.022;
      char.rotation.y=Math.sin(t*.25)*.045;
      ptcl.rotation.y+=.0003;
      purpL.intensity=4.5+Math.sin(t*1.4);
      scrL.intensity=3+Math.sin(t*2.1)*.7;
      renderer.render(scene,camera);
    };
    tick();

    const onResize=()=>{
      const w=window.innerWidth,h=window.innerHeight;
      camera.aspect=w/h; camera.updateProjectionMatrix(); renderer.setSize(w,h);
    };
    window.addEventListener('resize',onResize);

    return ()=>{
      cancelAnimationFrame(raf);
      window.removeEventListener('resize',onResize);
      renderer.dispose();
      if(el.contains(renderer.domElement)) el.removeChild(renderer.domElement);
    };
  }, []);

  return <div ref={mountRef} style={{ position:'fixed', inset:0, zIndex:0 }}/>;
}
